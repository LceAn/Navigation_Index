<script type="module" crossorigin="use-credentials">
    import configData from './src/cfg/config.js'; // 加载配置文件

    $(document).ready(function () {
        renderWebsites(configData);
        renderFooter(configData);
        applyRandomShineEffect(); // 调用随机扫光效果函数
    });

    function renderWebsites(data) {
        var templateSource = document.getElementById('index_list').innerHTML;
        var template = Handlebars.compile(templateSource);
        var html = template({ weblists: data.weblists });
        $('#box').html(html);

        // 为每个卡片设置随机渐变背景（图片加载失败时显示）
        var gradients = [
            'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
            'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
            'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
            'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
            'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
            'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)',
            'linear-gradient(135deg, #fccb90 0%, #d57eeb 100%)',
            'linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%)',
            'linear-gradient(135deg, #f5576c 0%, #ff9a9e 100%)',
            'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
            'linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%)',
            'linear-gradient(135deg, #fddb92 0%, #d1fdff 100%)',
            'linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%)',
            'linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%)'
        ];
        document.querySelectorAll('#box .card > div:first-child').forEach(function(el, i) {
            var gradient = gradients[i % gradients.length];
            el.dataset.fallbackBg = gradient;
        });
    }

    function renderFooter(data) {
        var footerSource = document.getElementById('footer_template').innerHTML;
        var footerTemplate = Handlebars.compile(footerSource);
        var footerHtml = footerTemplate({ footers: data.footers });
        $('#footer').html(footerHtml);
    }

    // 新增的随机扫光效果函数
    function applyRandomShineEffect() {
        const cards = document.querySelectorAll('.shark-wrap'); // 获取所有卡片

        cards.forEach(card => {
            // 生成一个随机的持续时间或延迟时间（例如0到5秒之间）
            const randomDelay = Math.random() * 10; // 随机延迟0到5秒
            const randomDuration = 2 + Math.random() * 3; // 随机持续时间2到5秒

            // 将随机的动画样式应用到每个卡片的伪元素上
            card.style.setProperty('--shine-delay', `${randomDelay}s`);
            card.style.setProperty('--shine-duration', `${randomDuration}s`);
        });
    }
</script>

<script>
    // 创建防抖函数
    function debounce(func, delay) {
        let timeoutId;
        return function() {
            const context = this;
            const args = arguments;
            
            // 清除之前的定时器
            clearTimeout(timeoutId);
            
            // 设置新的定时器
            timeoutId = setTimeout(() => {
                func.apply(context, args);
            }, delay);
        };
    }

    /* 点击天空背景区域或欢迎页面区域触发夜间模式切换 */
    $("body").on("click", ".mk-dark-mode-sky", debounce(function(e) {
        // 防止事件冒泡，确保只处理一次点击事件
        e.stopPropagation();
        toggleNightMode(); // 使用统一的切换函数
    }, 500)); // 500毫秒内只允许一次切换
    
    // 添加点击欢迎页面区域的切换功能
    $("#home").on("click", debounce(function(e) {
        // 如果点击的是其他有特定功能的元素（如向下滚动按钮等），不执行夜间模式切换
        if ($(e.target).closest('.scroll-down-tips, a, button').length) {
            return;
        }
        // 否则切换夜间模式
        toggleNightMode();
    }, 500)); // 500毫秒内只允许一次切换
</script>

<script>
    // 页面加载时设置当前页面的导航菜单状态
    function setActiveNavItem() {
        const navMenu = document.querySelector('.nav-menu');
        const navItems = navMenu.querySelectorAll('a');
        
        // 获取当前页面的内容
        const dynamicContent = document.getElementById('dynamic-content');
        const currentContentSource = dynamicContent.innerHTML.trim();
        
        navItems.forEach(item => {
            const href = item.getAttribute('onclick');
            
            // 判断是否为当前页面的逻辑
            const isCurrentPage = href ? 
                (currentContentSource.length > 0 && href.includes(getCurrentPageFileName())) : 
                false;
            
            if (isCurrentPage) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
    }

    // 获取当前页面的文件名
    function getCurrentPageFileName() {
        const dynamicContent = document.getElementById('dynamic-content');
        const contentSource = dynamicContent.innerHTML.trim();
        
        // 根据不同页面的特征判断
        if (contentSource.includes('about-container')) return 'about.html';
        if (contentSource.includes('timeline-container')) return 'timeline.html';
        if (contentSource.includes('更多')) return 'more.html';
        
        // 默认返回首页
        return 'index.html';
    }

    // 在页面加载和内容加载后调用
    window.addEventListener('load', setActiveNavItem);
    
    // loadPageContent — 使用 DOMParser 安全解析，防止 XSS
    function loadPageContent(url) {
        fetch(url)
            .then(response => response.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                // 移除所有 script 标签防止 XSS 注入
                doc.querySelectorAll('script').forEach(s => s.remove());
                document.getElementById('dynamic-content').innerHTML = doc.body.innerHTML;
                setActiveNavItem(); // 更新导航菜单状态
            })
            .catch(error => console.error('Error loading page:', error));
    }
</script>

<!-- 添加全屏滚动脚本 - 简化版本 -->
<script>
    // 全局变量，用于记录当前所在的section索引
    var currentSection = 0;
    
    // 添加全屏滚动效果
    document.addEventListener('DOMContentLoaded', function() {
        const sections = document.querySelectorAll('.fullpage-section');
        const totalSections = sections.length;
        let isScrolling = false;
        let touchStartY = 0;
        
        // 处理鼠标滚轮事件
        window.addEventListener('wheel', function(e) {
            if (isScrolling) return;
            
            // 如果当前在内容区域（第二个section）
            if (currentSection === 1) {
                // 检查内容区域是否已滚动到顶部
                const contentArea = document.getElementById('content');
                if (contentArea && contentArea.scrollTop <= 0 && e.deltaY < 0) {
                    // 只有当内容区域已滚动到顶部且用户继续向上滚动时，才回到欢迎页面
                    currentSection = 0;
                    scrollToSection(currentSection);
                    e.preventDefault(); // 阻止默认滚动
                }
                // 其他情况下，让内容区域自然滚动
                return;
            }
            
            // 对于欢迎页，正常处理全屏滚动
            if (e.deltaY > 0) {
                // 向下滚动
                if (currentSection < totalSections - 1) {
                    currentSection++;
                    scrollToSection(currentSection);
                }
            } else {
                // 向上滚动
                if (currentSection > 0) {
                    currentSection--;
                    scrollToSection(currentSection);
                }
            }
        }, { passive: false });
        
        // 处理触摸事件（移动设备）
        window.addEventListener('touchstart', function(e) {
            touchStartY = e.touches[0].clientY;
        });
        
        window.addEventListener('touchend', function(e) {
            const touchEndY = e.changedTouches[0].clientY;
            const diff = touchStartY - touchEndY;
            
            if (Math.abs(diff) < 85) return; // 忽略小的滑动
            
            // 如果当前在内容区域
            if (currentSection === 1) {
                // 检查内容区域是否已滚动到顶部
                const contentArea = document.getElementById('content');
                if (contentArea && contentArea.scrollTop <= 0 && diff < 0) {
                    // 只有当内容区域已滚动到顶部且用户继续向上滑动时，才回到欢迎页面
                    currentSection = 0;
                    scrollToSection(currentSection);
                }
                // 其他情况下，让内容区域自然滚动
                return;
            }
            
            // 对于欢迎页，正常处理全屏滚动
            if (diff > 0) {
                // 向上滑动 (向下翻页)
                if (currentSection < totalSections - 1) {
                    currentSection++;
                    scrollToSection(currentSection);
                }
            } else {
                // 向下滑动 (向上翻页)
                if (currentSection > 0) {
                    currentSection--;
                    scrollToSection(currentSection);
                }
            }
        });
        
        // 滚动到指定区域
        function scrollToSection(index) {
            isScrolling = true;
            
            // 调整显示滚动按钮和footer
            var scrollToTopButton = document.getElementById('TopButton');
            var goToGitHubButton = document.getElementById('GitHubButton');
            var goTozhihuButton = document.getElementById('zhihuButton');
            var footer_scroll = document.getElementById('footer_scroll');
            
            if (index > 0) {
                // 显示滚动按钮和footer
                if (scrollToTopButton) scrollToTopButton.style.display = 'block';
                if (goToGitHubButton) goToGitHubButton.style.display = 'block';
                if (goTozhihuButton) goTozhihuButton.style.display = 'block';
                if (footer_scroll) footer_scroll.style.display = 'block';
            } else {
                // 隐藏滚动按钮和footer
                if (scrollToTopButton) scrollToTopButton.style.display = 'none';
                if (goToGitHubButton) goToGitHubButton.style.display = 'none';
                if (goTozhihuButton) goTozhihuButton.style.display = 'none';
                if (footer_scroll) footer_scroll.style.display = 'none';
            }
            
            // 平滑滚动到对应区域
            sections[index].scrollIntoView({
                behavior: 'smooth'
            });
            
            // 防抖
            setTimeout(function() {
                isScrolling = false;
            }, 1000);
        }
        
        // 修改向下滚动按钮的行为
        const scrollDownBtn = document.querySelector('.scroll-down-tips');
        if (scrollDownBtn) {
            scrollDownBtn.addEventListener('click', function(e) {
                e.preventDefault();
                if (currentSection < totalSections - 1) {
                    currentSection++;
                    scrollToSection(currentSection);
                }
                return false;
            });
        }
    });
</script>
