    <style>
        /* 卡片基础样式 */
        .card {
            width: 100%; /* 确保卡片占满容器宽度 */
            border-radius: 8px;
            position: relative; /* 必须相对定位 */
            overflow: hidden; /* 隐藏超出部分 */
        }

        /* 卡片中的图片样式 */
        .card img {
            display: block;
            width: 100%;
            border-radius: 8px; /* 圆角效果 */
        }

        /* 扫光层的伪元素 */
        .shark-wrap::after {
            content: '';
            position: absolute;
            inset: -20%;
            background: linear-gradient(45deg, rgba(255, 255, 255, 0) 40%, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0) 60%);
            animation: shark-wrap var(--shine-duration, 2s) infinite;
            animation-delay: var(--shine-delay, 0s);
            transform: translateX(-100%);
            pointer-events: none; /* 禁用鼠标事件 */
        }

        /* 扫光动画 */
        @keyframes shark-wrap {
            to {
                transform: translateX(100%);
            }
        }


        /* 新按钮样式 */
        .neumorphic-btn {
            width: 40px; /* 调整为原按钮的大小 */
            height: 40px; /* 调整为原按钮的大小 */
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px; /* 边框圆角适应按钮大小 */
            font-size: 16px; /* 保持与之前字体大小一致 */
            color: #333;
            font-family: 'Didot', serif; /* 使用指定字体 */
            background-color: #fff;
            box-shadow:
                    4px 4px 8px rgba(0, 0, 0, 0.2),
                    -4px -4px 8px rgba(255, 255, 255, 1);
            user-select: none;
            transition: all 0.3s ease-out;
            border: none; /* 移除默认按钮边框 */
            cursor: pointer;
            outline: none; /* 移除按钮点击时的轮廓 */
        }

        /* 悬停时的凸起效果 */
        .neumorphic-btn:hover {
            box-shadow:
                    0 0 0 rgba(0, 0, 0, 0.2),
                    0 0 0 rgba(255, 255, 255, 0.8),
                    inset 2px 2px 5px rgba(0, 0, 0, 0.1),
                    inset -2px -2px 5px rgba(255, 255, 255, 1);
            font-size: 14px; /* 略微调整悬停时的字体大小 */
        }

        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
        }

        /* 页面背景 */
        body {
            height: 100vh;
            background: linear-gradient(200deg, #dad4ec, #f3e7e9);
        }

        /* 导航菜单样式 */
        .nav-menu {
            display: flex;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .nav-menu li {
            transition: 0.5s;
            margin: 0 15px;
        }

        .nav-menu li a {
            position: relative;
            display: block;
            text-align: center;
            color: #333;
            font-size: 18px;
            text-decoration: none;
        }

        /* 悬停时的模糊效果 */
        .nav-menu:hover li {
            opacity: 0.2;
            filter: blur(2px);
        }

        .nav-menu li:hover {
            opacity: 1;
            filter: blur(0px);
        }

    </style>

<script type="module" crossorigin="use-credentials">
    import configData from './src/cfg/config.js'; // 加载配置文件

    $(document).ready(function () {
        renderWebsites(configData);
        renderFooter(configData);
        applyRandomShineEffect(); // 调用随机扫光效果函数
    });

    function renderWebsites(data) {
        var templateSource = document.getElementById('index_list').innerHTML;
        var template = Handlebars.compile(templateSource);
        var html = template({ weblists: data.weblists });
        $('#box').html(html);
    }

    function renderFooter(data) {
        var footerSource = document.getElementById('footer_template').innerHTML;
        var footerTemplate = Handlebars.compile(footerSource);
        var footerHtml = footerTemplate({ footers: data.footers });
        $('#footer').html(footerHtml);
    }

    // 新增的随机扫光效果函数
    function applyRandomShineEffect() {
        const cards = document.querySelectorAll('.shark-wrap'); // 获取所有卡片

        cards.forEach(card => {
            // 生成一个随机的持续时间或延迟时间（例如0到5秒之间）
            const randomDelay = Math.random() * 10; // 随机延迟0到5秒
            const randomDuration = 2 + Math.random() * 3; // 随机持续时间2到5秒

            // 将随机的动画样式应用到每个卡片的伪元素上
            card.style.setProperty('--shine-delay', `${randomDelay}s`);
            card.style.setProperty('--shine-duration', `${randomDuration}s`);
        });
    }
</script>

<script type="text/javascript">
    jinrishici.load(function(result) {
        var sentence = document.querySelector("#poem_sentence");
        var info = document.querySelector("#poem_info");

        // 显示古诗内容
        sentence.textContent = result.data.content;

        // 显示古诗信息：朝代、作者、诗名
        var origin = result.data.origin;
        var infoText = '【' + origin.dynasty + '】' + origin.author + '《' + origin.title + '》';
        info.textContent = infoText;
    });
</script>

<script>
        function loadPageContent(page) {
        // 显示加载动画
        document.getElementById('dynamic-content').innerHTML = '<div class="loading">加载中...</div>';

        // 使用 fetch 异步加载外部 HTML 文件
        fetch(page)
        .then(response => {
        if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
    }
        return response.text(); // 以文本形式获取响应内容
    })
        .then(html => {
        document.getElementById('dynamic-content').innerHTML = html; // 将外部HTML内容插入到页面中
    })
        .catch(error => {
        console.error('加载页面内容时出错:', error);
        document.getElementById('dynamic-content').innerHTML = '<p>加载内容时出错，请稍后重试。</p>';
    });
    }
</script>
