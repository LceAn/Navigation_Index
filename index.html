<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="LceAn" id="meta-author">
    <meta name="description" content="LceAn 的个人网站导航" id="meta-description">
    <meta name="theme-color" content="#fbf8f1">
    <meta property="og:title" content="LceAn - 个人网站导航">
    <meta property="og:description" content="技术、生活与持续构建中的个人数字入口">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.lcean.com">
    <title>LceAn - 个人网站导航</title>

    <link rel="icon" type="image/png" href="src/img/logoTM.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,0,0&family=Noto+Serif+SC:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/iconfont.css">
    <link rel="stylesheet" href="src/css/redesign.css">
</head>

<body>
    <header class="site-header" id="site-header" aria-hidden="true" inert>
        <div class="header-inner">
            <a class="brand" href="#home" aria-label="返回首页" data-home-link>
                <img src="src/img/logoTM.png" alt="" width="42" height="42">
                <span>LceAn</span>
            </a>

            <nav class="primary-nav" aria-label="主导航">
                <button class="nav-link" type="button" data-page="about">关于</button>
                <button class="nav-link" type="button" data-page="timeline">时间线</button>
                <button class="nav-link" type="button" data-page="more">更多</button>
                <span class="nav-divider" aria-hidden="true"></span>
                <a class="icon-link iconfont icon-github"
                   href="https://github.com/LceAn"
                   target="_blank"
                   rel="noopener noreferrer"
                   aria-label="访问 GitHub"></a>
                <button class="theme-toggle" type="button" aria-label="切换昼夜主题" aria-pressed="false">
                    <span class="material-symbols-rounded theme-icon theme-icon-sun" aria-hidden="true">light_mode</span>
                    <span class="material-symbols-rounded theme-icon theme-icon-moon" aria-hidden="true">dark_mode</span>
                </button>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero" id="home" aria-labelledby="hero-title">
            <div class="hero-copy">
                <p class="hero-kicker" id="hero-kicker">我的导航页</p>
                <h1 id="hero-title">在技术与生活之间</h1>
                <img class="headline-brush" src="src/img/headline-brush.png" alt="" aria-hidden="true">
                <p class="hero-note">这里记录我的思考、实践与生活片段。</p>
            </div>

            <figure class="hero-art" aria-label="日落海岸山水">
                <img class="hero-image hero-image-day"
                     src="src/img/hero-landscape-day.png"
                     alt="日落时分的海岸、山崖与松林">
                <img class="hero-image hero-image-night"
                     src="src/img/hero-landscape-night.png"
                     alt=""
                     aria-hidden="true">
                <figcaption class="hero-poem">
                    <span id="poem-sentence">深秋帘幕千家雨，落日楼台一笛风。</span>
                    <small id="poem-source">[唐代] 杜牧《题宣州开元寺水阁阁下宛溪夹溪居人》</small>
                </figcaption>
            </figure>

            <a class="explore-link" href="#directory">
                <span class="material-symbols-rounded" aria-hidden="true">south</span>
                <span>向下探索</span>
            </a>
        </section>

        <section class="directory-section" id="directory" aria-label="个人网站入口">
            <div class="section-shell">
                <p class="directory-label" data-directory-label>LCEAN · PERSONAL INDEX</p>
                <div class="section-heading">
                    <div>
                        <p class="section-eyebrow"></p>
                        <h2 id="directory-title"></h2>
                    </div>
                    <button class="back-to-directory" type="button" data-back-to-directory hidden>
                        <span class="material-symbols-rounded" aria-hidden="true">arrow_back</span>
                        返回入口
                    </button>
                </div>

                <div id="dynamic-content">
                    <div class="cards-grid" id="cards-grid" aria-live="polite"></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-identity">
                <span id="footer-copy">© 2020 by LceAn</span>
                <span class="footer-separator" aria-hidden="true">·</span>
                <a id="footer-record" href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">皖ICP2020017839号-1</a>
            </div>
            <div class="footer-metrics" aria-label="站点访问数据">
                <span id="busuanzi_container_site_pv">访问 <strong id="busuanzi_value_site_pv">--</strong></span>
                <span id="busuanzi_container_site_uv">访客 <strong id="busuanzi_value_site_uv">--</strong></span>
                <span class="footer-ip">IP <strong id="user-ip">获取中</strong></span>
            </div>
        </div>
    </footer>

    <script type="module" src="src/js/redesign.js"></script>
</body>
</html>
