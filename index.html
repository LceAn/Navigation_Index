<script id="index_list" type="text/x-handlebars-template">
    {{#each weblists}}
    <a target="_blank" rel="noopener" href="{{url}}"
       class="card p-4 md:w-1/3 sm:mb-4 mb-6 hover:shadow-xl hover:bg-gray-400 transition duration-200 ease-in rounded-lg personal">
        <div class="rounded-lg h-64 overflow-hidden relative">

            <img alt="{{alt}}" class="object-cover object-center h-full w-full"
                 src="{{img_url}}"/>

            <span class="bg-blue-500 text-white px-3 py-1 tracking-widest text-xs absolute right-0 top-0 rounded-bl">{{span}}</span>
            <h2 class="text-white px-2 py-1 tracking-widest text-2xl leading-tight font-extrabold font-bree text-center w-full h-full flex justify-center items-center absolute top-0 left-0">
                {{title}}
            </h2>
            <p
                    class="text-white px-2 py-1 tracking-widest text-md leading-tight font-light w-full text-center absolute bottom-0 left-0">
                {{description}}
            </p>
        </div>
    </a>
    {{/each}}
</script>

<button id="TopButton" class="scrollToButton iconfont icon_top" onclick="scrollToTop()" style=" bottom: 100px;right: 20px;"></button>

    <a href="https://beian.miit.gov.cn">{{beian}}</a>
    <span>&nbsp;|&nbsp;</span>
    <span id="busuanzi_container_site_pv">本站总访问量<span id="busuanzi_value_site_pv"></span>次 </span>
    <span>&nbsp;|&nbsp;</span>
    <span class="copyright">您的IP：
        <span id="user-ip"></span>
    </span>
    {{/each}}
</script>


<script>(async function() {
    const response = await fetch('https://api.ipify.org?format=json');
    const data = await response.json();
    document.getElementById('user-ip').textContent = data.ip;
})();
</script>

<script type="module" crossorigin="use-credentials">
    import configData from './src/cfg/config.js'; //加载配置文件

    $(document).ready(function () {
        renderWebsites(configData);
        renderFooter(configData);
    });

    function renderWebsites(data) {
        var templateSource = document.getElementById('index_list').innerHTML;
        var template = Handlebars.compile(templateSource);
        var html = template({ weblists: data.weblists });
        $('#box').html(html);
    }

    function renderFooter(data) {
        var footerSource = document.getElementById('footer_template').innerHTML;
        var footerTemplate = Handlebars.compile(footerSource);
        var footerHtml = footerTemplate({ footers: data.footers });
        $('#footer').html(footerHtml);
    }
</script>

<script src="src/js/jinrishici.js" charset="utf-8"></script>
<script type="text/javascript">
    jinrishici.load(function(result) {
        var sentence = document.querySelector("#poem_sentence");
        var info = document.querySelector("#poem_info");

        // 显示古诗内容
        sentence.textContent = result.data.content;

        // 显示古诗信息：朝代、作者、诗名
        var origin = result.data.origin;
        var infoText = '【' + origin.dynasty + '】' + origin.author + '《' + origin.title + '》';
        info.textContent = infoText;
    });
</script>

<script>
    /* 这里为了方便演示，点击页面中任意位置即可触发切换动画 */
    $("body").on("click", "header", function() {
        $("body").toggleClass("mk-dark-mode");

        var angle = $('.mk-dark-mode-planet').data('angle') + 360 || 360;
        $('.mk-dark-mode-planet').css({'transform': 'rotate(' + angle + 'deg)' });
        $('.mk-dark-mode-planet').data('angle', angle);
    });
</script>
