<script type="module" crossorigin="use-credentials">
    import configData from './src/cfg/config.js'; // 加载配置文件

    $(document).ready(function () {
        applySiteConfig(configData);
        renderWebsites(configData);
        renderFooter(configData);
        applyRandomShineEffect();
        if (typeof initSidebarButtons === 'function') {
            initSidebarButtons(configData.sidebarButtons);
        }
    });

    // 应用站点配置（meta 信息 + 功能开关）
    function applySiteConfig(data) {
        if (data.site) {
            document.title = data.site.title || document.title;
            var descMeta = document.getElementById('meta-description');
            if (descMeta && data.site.description) descMeta.content = data.site.description;
            var authorMeta = document.getElementById('meta-author');
            if (authorMeta && data.site.author) authorMeta.content = data.site.author;
        }

        // 根据功能开关动态加载
        if (data.features) {
            // 樱花效果
            if (data.features.sakura) {
                var sakuraScript = document.createElement('script');
                sakuraScript.src = 'src/js/sakuraPlus.js';
                document.body.appendChild(sakuraScript);
            }
            // 今日诗词
            if (data.features.poetry) {
                var poetryScript = document.createElement('script');
                poetryScript.src = 'src/js/jinrishici.js';
                poetryScript.setAttribute('charset', 'utf-8');
                poetryScript.onload = function() {
                    jinrishici.load(function(result) {
                        var sentence = document.querySelector("#poem_sentence");
                        var info = document.querySelector("#poem_info");
                        if (sentence) sentence.textContent = result.data.content;
                        if (info) {
                            var origin = result.data.origin;
                            info.textContent = '【' + origin.dynasty + '】' + origin.author + '《' + origin.title + '》';
                        }
                    });
                };
                document.body.appendChild(poetryScript);
            }
            // IP 显示
            if (data.features.showIP) {
                fetch('https://api.ipify.org?format=json')
                    .then(r => r.json())
                    .then(d => {
                        var ipEl = document.getElementById('user-ip');
                        if (ipEl) ipEl.textContent = d.ip;
                    });
            }
            // 访问量统计
            if (data.features.visitorCount) {
                var busuanziScript = document.createElement('script');
                busuanziScript.src = 'src/js/busuanzi.pure.mini.js';
                busuanziScript.async = true;
                document.body.appendChild(busuanziScript);
            }
        }
    }

    function renderWebsites(data) {
        var templateSource = document.getElementById('index_list').innerHTML;
        var template = Handlebars.compile(templateSource);
        var html = template({ weblists: data.weblists });
        $('#box').html(html);

        // 为每个卡片设置随机渐变背景（图片加载失败时显示）
        var gradients = [
            'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
            'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
            'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
            'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
            'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
            'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)',
            'linear-gradient(135deg, #fccb90 0%, #d57eeb 100%)',
            'linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%)',
            'linear-gradient(135deg, #f5576c 0%, #ff9a9e 100%)',
            'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
            'linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%)',
            'linear-gradient(135deg, #fddb92 0%, #d1fdff 100%)',
            'linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%)',
            'linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%)'
        ];
        document.querySelectorAll('#box .card > div:first-child').forEach(function(el, i) {
            var gradient = gradients[i % gradients.length];
            el.dataset.fallbackBg = gradient;
        });

        // 根据配置加载樱花效果
        if (configData.features && configData.features.sakura) {
            var sakuraScript = document.createElement('script');
            sakuraScript.src = 'src/js/sakuraPlus.js';
            document.body.appendChild(sakuraScript);
        }
    }

    function renderFooter(data) {
        var footerSource = document.getElementById('footer_template').innerHTML;
        var footerTemplate = Handlebars.compile(footerSource);
        var footerData = {
            homepage: (data.site && data.site.homepage) ? data.site.homepage : 'https://www.lcean.com',
            copyright: (data.site && data.site.copyright) ? data.site.copyright.replace('by', '- ' + new Date().getFullYear() + ' by') : '',
            beian: (data.site && data.site.beian) ? data.site.beian : '',
            githubRepo: (data.site && data.site.githubRepo) ? data.site.githubRepo : '',
            repoName: (data.site && data.site.githubRepo) ? data.site.githubRepo.replace('https://github.com/', '').split('/')[1] || '' : '',
            version: (data.site && data.site.version) ? data.site.version : '',
            showIP: data.features && data.features.showIP,
            showVisitorCount: data.features && data.features.visitorCount,
        };
        var footerHtml = footerTemplate(footerData);
        $('#footer').html(footerHtml);

        // IP 和统计需要在 DOM 渲染后触发
        if (data.features && data.features.showIP) {
            fetch('https://api.ipify.org?format=json')
                .then(r => r.json())
                .then(d => {
                    var ipEl = document.getElementById('user-ip');
                    if (ipEl) ipEl.textContent = d.ip;
                });
        }
    }

    // 新增的随机扫光效果函数
    function applyRandomShineEffect() {
        const cards = document.querySelectorAll('.shark-wrap'); // 获取所有卡片

        cards.forEach(card => {
            // 生成一个随机的持续时间或延迟时间（例如0到5秒之间）
            const randomDelay = Math.random() * 10; // 随机延迟0到5秒
            const randomDuration = 2 + Math.random() * 3; // 随机持续时间2到5秒

            // 将随机的动画样式应用到每个卡片的伪元素上
            card.style.setProperty('--shine-delay', `${randomDelay}s`);
            card.style.setProperty('--shine-duration', `${randomDuration}s`);
        });
    }
</script>

<script>
    // 创建防抖函数
    function debounce(func, delay) {
        let timeoutId;
        return function() {
            const context = this;
            const args = arguments;
            
            // 清除之前的定时器
            clearTimeout(timeoutId);
            
            // 设置新的定时器
            timeoutId = setTimeout(() => {
                func.apply(context, args);
            }, delay);
        };
    }

    /* 点击天空背景区域或欢迎页面区域触发夜间模式切换 */
    $("body").on("click", ".mk-dark-mode-sky", debounce(function(e) {
        // 防止事件冒泡，确保只处理一次点击事件
        e.stopPropagation();
        toggleNightMode(); // 使用统一的切换函数
    }, 500)); // 500毫秒内只允许一次切换
    
    // 添加点击欢迎页面区域的切换功能
    $("#home").on("click", debounce(function(e) {
        // 如果点击的是其他有特定功能的元素（如向下滚动按钮等），不执行夜间模式切换
        if ($(e.target).closest('.scroll-down-tips, a, button').length) {
            return;
        }
        // 否则切换夜间模式
        toggleNightMode();
    }, 500)); // 500毫秒内只允许一次切换
</script>

<script>
    // 页面加载时设置当前页面的导航菜单状态
    function setActiveNavItem() {
        const navMenu = document.querySelector('.nav-menu');
        const navItems = navMenu.querySelectorAll('a');
        
        // 获取当前页面的内容
        const dynamicContent = document.getElementById('dynamic-content');
        const currentContentSource = dynamicContent.innerHTML.trim();
        
        navItems.forEach(item => {
            const href = item.getAttribute('onclick');
            
            // 判断是否为当前页面的逻辑
            const isCurrentPage = href ? 
                (currentContentSource.length > 0 && href.includes(getCurrentPageFileName())) : 
                false;
            
            if (isCurrentPage) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
    }

    // 获取当前页面的文件名
    function getCurrentPageFileName() {
        const dynamicContent = document.getElementById('dynamic-content');
        const contentSource = dynamicContent.innerHTML.trim();
        
        // 根据不同页面的特征判断
        if (contentSource.includes('about-container')) return 'about.html';
        if (contentSource.includes('timeline-container')) return 'timeline.html';
        if (contentSource.includes('更多')) return 'more.html';
        
        // 默认返回首页
        return 'index.html';
    }

    // 在页面加载和内容加载后调用
    window.addEventListener('load', setActiveNavItem);
    
    // loadPageContent — 使用 DOMParser 安全解析，防止 XSS
    function loadPageContent(url) {
        fetch(url)
            .then(response => response.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                // 移除所有 script 标签防止 XSS 注入
                doc.querySelectorAll('script').forEach(s => s.remove());
                document.getElementById('dynamic-content').innerHTML = doc.body.innerHTML;
                setActiveNavItem(); // 更新导航菜单状态

                            // 加载关于页面后执行版本检测
                if (url.includes('about.html')) {
                    import('./src/cfg/config.js?t=' + Date.now())
                        .then(m => checkVersion(m.default))
                        .catch(() => {});
                }
            })
            .catch(error => console.error('Error loading page:', error));
    }

    // 版本检测 — 对比本地版本与 GitHub 最新版本
    function checkVersion(data) {
        var site = data && data.site ? data.site : null;
        if (!site || !site.githubRepo || !site.version) return;

        var versionEl = document.getElementById('version-status');
        if (!versionEl) return;
        var remoteVersionEl = document.getElementById('remote-version');
        var localVersionEl = document.getElementById('local-version');

        // 显示本地版本
        if (localVersionEl) localVersionEl.textContent = site.version;

        // 从 GitHub API 获取最新 release/tag
        var apiParts = site.githubRepo.replace('https://github.com/', '').split('/');
        if (apiParts.length < 2) return;
        var owner = apiParts[0], repo = apiParts[1];

        // 先尝试获取最新的 release
        fetch('https://api.github.com/repos/' + owner + '/' + repo + '/releases/latest')
            .then(r => r.ok ? r.json() : null)
            .then(release => {
                if (release && release.tag_name) {
                    var remoteVersion = release.tag_name.replace(/^v/, '');
                    if (remoteVersionEl) remoteVersionEl.textContent = 'v' + remoteVersion;
                    compareVersions(site.version, remoteVersion, versionEl, release.html_url);
                } else {
                    // 没有 release，回退到最新 commit date
                    fetch('https://api.github.com/repos/' + owner + '/' + repo + '/commits?per_page=1')
                        .then(r => r.json())
                        .then(commits => {
                            if (commits && commits[0]) {
                                var date = new Date(commits[0].commit.committer.date);
                                var dateStr = date.getFullYear() + '-' +
                                    String(date.getMonth() + 1).padStart(2, '0') + '-' +
                                    String(date.getDate()).padStart(2, '0');
                                if (remoteVersionEl) remoteVersionEl.textContent = dateStr + ' (最新提交)';
                                versionEl.innerHTML = '<span style="color:#999">✅ 已是最新</span>';
                            }
                        });
                }
            })
            .catch(() => {
                if (remoteVersionEl) remoteVersionEl.textContent = '检测失败';
                versionEl.innerHTML = '<span style="color:#999">⚠️ 无法连接 GitHub</span>';
            });
    }

    function compareVersions(local, remote, statusEl, releaseUrl) {
        var lParts = local.replace(/^v/, '').split('.').map(Number);
        var rParts = remote.replace(/^v/, '').split('.').map(Number);
        var isLatest = true;
        for (var i = 0; i < Math.max(lParts.length, rParts.length); i++) {
            if ((rParts[i] || 0) > (lParts[i] || 0)) { isLatest = false; break; }
        }
        if (isLatest) {
            statusEl.innerHTML = '<span style="color:#52c41a">✅ 已是最新版本</span>';
        } else {
            statusEl.innerHTML = '<a href="' + releaseUrl + '" target="_blank" rel="noopener noreferrer" ' +
                'style="color:#1890ff;text-decoration:none;font-weight:500">🔄 发现新版本 v' + remoteVersionEl.textContent.replace(/^v/, '') + '，点击更新</a>';
        }
    }

    // 暴露到全局，供 onclick 调用
    window.loadPageContent = loadPageContent;
    window.checkVersion = checkVersion;
</script>

<!-- 全屏滚动脚本 - 单滚动条方案 -->
<script>
    var currentSection = 0;

    document.addEventListener('DOMContentLoaded', function() {
        const sections = document.querySelectorAll('.fullpage-section');
        const totalSections = sections.length;
        let isAnimating = false;
        let animTimer = null;
        let touchStartY = 0;

        // 处理鼠标滚轮事件
        window.addEventListener('wheel', function(e) {
            if (isAnimating) {
                e.preventDefault();
                return;
            }

            if (currentSection === 0) {
                // 在第一页（欢迎页）— 向下滚进入第二页
                if (e.deltaY > 0) {
                    e.preventDefault();
                    currentSection = 1;
                    scrollToSection(1);
                }
                // 向上滚：已经在第一页顶部，不需要处理
                return;
            }

            // 在第二页及之后 — 自然滚动，不拦截
            // 但如果用户滚到了页面最顶部，自动回第一页
        }, { passive: false });

        // 监听滚动位置，检测是否需要切回第一页
        window.addEventListener('scroll', function() {
            if (isAnimating) return;
            if (window.scrollY <= 5 && currentSection === 1) {
                currentSection = 0;
                updateUI(0);
            }
        });

        // 处理触摸事件（移动设备）
        window.addEventListener('touchstart', function(e) {
            touchStartY = e.touches[0].clientY;
        });

        window.addEventListener('touchmove', function(e) {
            // 在第一页时拦截触摸滚动，防止浏览器默认滚动
            if (currentSection === 0 && !isAnimating) {
                e.preventDefault();
            }
        }, { passive: false });

        window.addEventListener('touchend', function(e) {
            var touchEndY = e.changedTouches[0].clientY;
            var diff = touchStartY - touchEndY;

            if (Math.abs(diff) < 50) return;

            if (currentSection === 0) {
                if (diff > 0) {
                    currentSection = 1;
                    scrollToSection(1);
                }
            }
        });

        function scrollToSection(index) {
            isAnimating = true;
            var targetY = sections[index].offsetTop;
            window.scrollTo({
                top: targetY,
                behavior: 'smooth'
            });
            updateUI(index);
            if (animTimer) clearTimeout(animTimer);
            animTimer = setTimeout(function() {
                isAnimating = false;
            }, 600);
        }

        function updateUI(index) {
            var buttons = ['TopButton', 'GitHubButton', 'zhihuButton'];
            buttons.forEach(function(id) {
                var el = document.getElementById(id);
                if (el) el.style.display = index > 0 ? 'block' : 'none';
            });
            var footer = document.getElementById('footer_scroll');
            if (footer) footer.style.display = index > 0 ? 'block' : 'none';
        }

        // 向下滚动按钮
        var scrollDownBtn = document.querySelector('.scroll-down-tips');
        if (scrollDownBtn) {
            scrollDownBtn.addEventListener('click', function(e) {
                e.preventDefault();
                if (currentSection === 0) {
                    currentSection = 1;
                    scrollToSection(1);
                }
                return false;
            });
        }
    });
</script>
